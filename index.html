<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB + Bodyweight Training Log</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --accent: #e8c86b;
            --text: #e0e0e0;
            --muted: #666;
            --kb: #e8c86b;
            --bw: #64b5f6;
            --run: #81c784;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
        }

        /* ── Setup ── */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 2rem;
            padding: 2rem;
        }

        #setup h1 { font-size: 2rem; color: var(--accent); }
        #setup p  { color: var(--muted); font-size: 0.95rem; }

        .setup-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            color: var(--muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="date"] {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 0.75rem 1rem;
            font-size: 1rem;
            width: 100%;
            color-scheme: dark;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.8; }

        button.ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        button.ghost:hover { color: var(--text); border-color: #444; }

        /* ── Log ── */
        #log { display: none; }

        .log-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .log-header h1 { font-size: 1.1rem; color: var(--accent); }

        .hdr-actions { display: flex; gap: 0.5rem; }
        .hdr-actions button { font-size: 0.8rem; padding: 0.45rem 0.9rem; }

        .log-body {
            max-width: 780px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ── Week ── */
        .week-section { margin-bottom: 3rem; }

        .week-title {
            font-size: 1.35rem;
            color: var(--accent);
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .week-stat { font-size: 0.8rem; color: var(--muted); font-weight: normal; }

        .prog-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 1.25rem;
        }
        .prog-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* ── Day card ── */
        .day-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .day-hdr {
            padding: 0.9rem 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .day-hdr:hover { background: rgba(255,255,255,0.02); }
        .day-hdr.kb  { border-left: 3px solid var(--kb); }
        .day-hdr.bw  { border-left: 3px solid var(--bw); }
        .day-hdr.run { border-left: 3px solid var(--run); }

        .day-name { font-weight: 600; font-size: 0.95rem; }
        .day-sub  { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

        .day-meta { display: flex; align-items: center; gap: 0.65rem; }

        .badge { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 20px; }
        .badge.kb  { background: rgba(232,200,107,0.12); color: var(--kb); }
        .badge.bw  { background: rgba(100,181,246,0.12); color: var(--bw); }
        .badge.run { background: rgba(129,199,132,0.12); color: var(--run); }

        .day-prog { font-size: 0.78rem; color: var(--muted); }

        .chevron { color: var(--muted); font-size: 0.7rem; transition: transform 0.2s; }
        .chevron.open { transform: rotate(180deg); }

        .day-body {
            display: none;
            padding: 0.25rem 1.1rem 1rem;
            border-top: 1px solid var(--border);
        }

        /* ── Checklist ── */
        .checklist { list-style: none; padding: 0.5rem 0; }

        .checklist li {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.3rem 0;
            font-size: 0.875rem;
        }

        .checklist input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        .checklist li.done span { text-decoration: line-through; color: var(--muted); }

        /* ── KB counter ── */
        .kb-controls {
            padding: 0.75rem 0 0.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .counter-row {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }
        .counter-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--border);
            color: var(--text);
            border: none;
            font-size: 1.3rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
            line-height: 1;
        }
        .counter-btn:hover { background: #383838; opacity: 1; }
        .counter-btn:active { background: #444; }
        .counter-val {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            min-width: 2.5rem;
            text-align: center;
            line-height: 1;
        }
        .counter-label { font-size: 0.8rem; color: var(--muted); }
        .complete-check-row {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-size: 0.875rem;
            padding: 0.4rem 0 0.25rem;
            cursor: pointer;
            user-select: none;
            width: fit-content;
        }
        .complete-check-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ── Completed day ── */
        .day-card.day-done {
            opacity: 0.32;
            transition: opacity 0.35s ease;
        }
        .day-card.day-done .day-hdr.kb,
        .day-card.day-done .day-hdr.bw,
        .day-card.day-done .day-hdr.run {
            border-left-color: var(--border);
        }

        /* ── Week complete button ── */
        .week-complete-btn {
            display: block;
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px dashed var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
        }
        .week-complete-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            opacity: 1;
        }

        /* ── Collapsed week ── */
        .week-title-done {
            color: var(--muted);
            font-size: 1.1rem;
            border-bottom-color: rgba(255,255,255,0.05);
        }
        .done-badge {
            font-size: 0.75rem;
            color: var(--run);
            font-weight: 500;
        }
        .show-week-btn {
            font-size: 0.72rem;
            padding: 0.2rem 0.65rem;
            border-radius: 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-weight: 400;
            margin-left: auto;
        }
        .show-week-btn:hover { border-color: #555; color: #aaa; opacity: 1; }

        /* ── Export modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            width: 90%;
            max-width: 580px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .modal-card h2 { color: var(--accent); font-size: 1.1rem; }
        .modal-card textarea {
            flex: 1;
            min-height: 320px;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            color: #aaa;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.65rem;
            resize: vertical;
        }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .modal-actions button { font-size: 0.85rem; padding: 0.55rem 1rem; }
    </style>
</head>
<body>

<!-- ── Setup ── -->
<div id="setup">
    <h1>KB + Bodyweight</h1>
    <p>5-week training log — Kettlebell ladders &amp; bodyweight skill work</p>
    <div class="setup-card">
        <label for="start-date">Program Start Date</label>
        <input type="date" id="start-date">
        <button id="gen-btn">Generate Training Plan</button>
    </div>
</div>

<!-- ── Log ── -->
<div id="log">
    <div class="log-header">
        <h1>KB + Bodyweight — 5 Week Plan</h1>
        <div class="hdr-actions">
            <button class="ghost" id="export-btn">Export MD</button>
            <button class="ghost" id="reset-btn">Reset</button>
        </div>
    </div>
    <div class="log-body" id="log-body"></div>
</div>

<!-- ── Export modal ── -->
<div class="modal-overlay" id="export-modal">
    <div class="modal-card">
        <h2>Markdown Export</h2>
        <textarea id="export-text" readonly></textarea>
        <div class="modal-actions">
            <button id="copy-btn">Copy to Clipboard</button>
            <button class="ghost" id="close-btn">Close</button>
        </div>
    </div>
</div>

<script>
const KB_PLAN = [
    { week: 1, workouts: ["Ladder 1, 2, 3",         "Sets of 1",  "Sets of 2"]    },
    { week: 2, workouts: ["Ladder 1, 2, 3",         "Sets of 1",  "Sets of 3"]    },
    { week: 3, workouts: ["Ladder 1, 2, 3, 4",      "Sets of 2",  "Sets of 3"]    },
    { week: 4, workouts: ["Ladder 1, 2, 3, 4, (5)", "Sets of 2",  "Sets of 3, 4"] },
    { week: 5, workouts: ["3 × 3",                  "NERM"]                       }
];

const BW_EXERCISES = [
    "Pull-ups: 3 × 8-12 (control negatives)",
    "Inverted Rows: 3 × 10-15 (supinated grip)",
    "Pike Push-ups: 3 × 8-12 (lean forward)",
    "Decline Push-ups: 3 × 10-15 (deficit/stretch)",
    "Dips: 3 × 10-15 (chest lean)",
    "Hip Hinges: 3 × 12-20",
    "Dragon Flags: 3 × 5-10 (anti-extension)"
];

const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let plan  = [];
let state = {};

function pad(n)          { return String(n).padStart(2,'0'); }
function dateKey(d)      { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtDate(d)      { return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`; }
function addDays(d, n)   { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function loadState()     { try { return JSON.parse(localStorage.getItem('kb_log') || '{}'); } catch(e) { return {}; } }
function saveState()     { try { localStorage.setItem('kb_log', JSON.stringify(state)); } catch(e) {} }
function getCheck(k, i)  { return !!state[k]?.c?.[i]; }
function setCheck(k,i,v) { if (!state[k]) state[k]={}; if (!state[k].c) state[k].c={}; state[k].c[i]=v; saveState(); }
function getCount(k)     { return state[k + '_cnt'] || 0; }
function setCount(k, v)  { state[k + '_cnt'] = v; saveState(); }

function buildPlan(start) {
    return KB_PLAN.map((kbWeek, w) => {
        let kbi = 0;
        // 6 days: Mon(0)–Sat(5)
        const days = [0,1,2,3,4,5].map(d => {
            const date = addDays(start, w*7 + d);
            if (d === 5) {
                return { type:'run', date, label:fmtDate(date), key:dateKey(date),
                         items:['Run'] };
            }
            const isKB = d===0 || d===2 || d===4;
            if (isKB) {
                const desc = kbWeek.workouts[kbi++] ?? null;
                return { type:'kb', date, label:fmtDate(date), key:dateKey(date), desc,
                         items: [] };
            }
            return { type:'bw', date, label:fmtDate(date), key:dateKey(date),
                     items:[...BW_EXERCISES] };
        });
        return { week: w+1, days };
    });
}

function dayProgress(day) {
    if (day.type === 'kb') {
        const done = !!state[day.key + '_done'] ? 1 : 0;
        return { done, total: 1 };
    }
    const done = day.items.filter((_,i) => getCheck(day.key,i)).length;
    return { done, total: day.items.length };
}

function updateKBDstat(key) {
    const el = document.getElementById(`dstat-${key}`);
    if (!el) return;
    const isDone  = !!state[key + '_done'];
    const count   = getCount(key);
    el.textContent = isDone ? '✓' : (count > 0 ? String(count) : '—');
}

function weekProgress(week) {
    let done=0, total=0;
    week.days.forEach(d => { const p=dayProgress(d); done+=p.done; total+=p.total; });
    return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

function createDayCard(day, week) {
    const dp         = dayProgress(day);
    const card       = document.createElement('div');
    card.className   = 'day-card';

    const badgeLabel = day.type==='kb' ? 'Kettlebell' : day.type==='bw' ? 'Bodyweight' : 'Run';
    const sub        = day.type==='kb' ? day.desc : day.type==='bw' ? 'Bodyweight circuit' : 'Cardio';

    const isDone     = !!state[day.key + '_done'];
    const count      = getCount(day.key);
    const initDstat  = day.type === 'kb'
        ? (isDone ? '✓' : (count > 0 ? String(count) : '—'))
        : `${dp.done}/${dp.total}`;

    card.innerHTML = `
        <div class="day-hdr ${day.type}">
            <div>
                <div class="day-name">${day.label}</div>
                <div class="day-sub">${sub}</div>
            </div>
            <div class="day-meta">
                <span class="day-prog" id="dstat-${day.key}">${initDstat}</span>
                <span class="badge ${day.type}">${badgeLabel}</span>
                <span class="chevron" id="chev-${day.key}">▼</span>
            </div>
        </div>
        <div class="day-body" id="body-${day.key}"></div>
    `;

    card.querySelector('.day-hdr').addEventListener('click', () => toggleBody(day.key));

    const bodyEl = card.querySelector(`#body-${day.key}`);

    if (day.type === 'kb') {
        // ── Counter + complete checkbox ──
        const controls = document.createElement('div');
        controls.className = 'kb-controls';

        // Counter row
        const counterRow  = document.createElement('div');
        counterRow.className = 'counter-row';

        const minusBtn = document.createElement('button');
        minusBtn.className   = 'counter-btn';
        minusBtn.textContent = '−';

        const countVal = document.createElement('span');
        countVal.className   = 'counter-val';
        countVal.textContent = count;

        const plusBtn = document.createElement('button');
        plusBtn.className   = 'counter-btn';
        plusBtn.textContent = '+';

        const countLabel = document.createElement('span');
        countLabel.className   = 'counter-label';
        countLabel.textContent = 'sets';

        minusBtn.addEventListener('click', e => {
            e.stopPropagation();
            const cur = getCount(day.key);
            if (cur <= 0) return;
            setCount(day.key, cur - 1);
            countVal.textContent = cur - 1;
            updateKBDstat(day.key);
            refreshStats(day.key, week.week);
        });

        plusBtn.addEventListener('click', e => {
            e.stopPropagation();
            const cur = getCount(day.key);
            setCount(day.key, cur + 1);
            countVal.textContent = cur + 1;
            updateKBDstat(day.key);
            refreshStats(day.key, week.week);
        });

        counterRow.appendChild(minusBtn);
        counterRow.appendChild(countVal);
        counterRow.appendChild(plusBtn);
        counterRow.appendChild(countLabel);

        // Complete checkbox
        const completeRow = document.createElement('label');
        completeRow.className = 'complete-check-row';

        const cb = document.createElement('input');
        cb.type    = 'checkbox';
        cb.checked = isDone;

        const cbLabel = document.createElement('span');
        cbLabel.textContent = 'Workout Complete';

        cb.addEventListener('change', () => {
            state[day.key + '_done'] = cb.checked;
            saveState();
            updateKBDstat(day.key);
            refreshStats(day.key, week.week);
            checkDayCompletion(day, card, week.week);
        });

        completeRow.appendChild(cb);
        completeRow.appendChild(cbLabel);
        controls.appendChild(counterRow);
        controls.appendChild(completeRow);
        bodyEl.appendChild(controls);

    } else {
        // ── Checklist (BW + Run) ──
        const ul = document.createElement('ul');
        ul.className = 'checklist';
        day.items.forEach((item, idx) => {
            const checked = getCheck(day.key, idx);
            const li = document.createElement('li');
            li.className = checked ? 'done' : '';
            const cbx = document.createElement('input');
            cbx.type    = 'checkbox';
            cbx.checked = checked;
            const sp    = document.createElement('span');
            sp.textContent = item;
            cbx.addEventListener('change', () => {
                li.className = cbx.checked ? 'done' : '';
                setCheck(day.key, idx, cbx.checked);
                refreshStats(day.key, week.week);
                checkDayCompletion(day, card, week.week);
            });
            li.appendChild(cbx);
            li.appendChild(sp);
            ul.appendChild(li);
        });
        bodyEl.appendChild(ul);
    }

    return card;
}

function checkDayCompletion(day, card, weekNum) {
    const dp       = dayProgress(day);
    const isNowDone = dp.total > 0 && dp.done === dp.total;
    const wasDone   = card.classList.contains('day-done');
    if (isNowDone === wasDone) return;

    card.classList.toggle('day-done', isNowDone);
    state[day.key + '_done'] = isNowDone;
    saveState();

    if (isNowDone) {
        const container = document.getElementById(`days-${weekNum}`);
        if (container) container.appendChild(card);
    }
}

function render() {
    const body = document.getElementById('log-body');
    body.innerHTML = '';

    plan.forEach(week => {
        const isWeekDone = !!state['week_done_' + week.week];
        const wp  = weekProgress(week);
        const sec = document.createElement('div');
        sec.className = 'week-section';
        sec.id = `week-${week.week}`;

        if (isWeekDone) {
            sec.innerHTML = `
                <div class="week-title week-title-done">
                    Week ${week.week}
                    <span class="done-badge">✓ Complete</span>
                    <button class="show-week-btn">Show</button>
                </div>
            `;
            sec.querySelector('.show-week-btn').addEventListener('click', () => {
                state['week_done_' + week.week] = false;
                saveState();
                render();
            });
            body.appendChild(sec);
            return;
        }

        sec.innerHTML = `
            <div class="week-title">
                Week ${week.week}
                <span class="week-stat" id="wstat-${week.week}">${wp.done}/${wp.total} complete</span>
            </div>
            <div class="prog-bar"><div class="prog-fill" id="wbar-${week.week}" style="width:${wp.pct}%"></div></div>
        `;

        const daysContainer = document.createElement('div');
        daysContainer.id        = `days-${week.week}`;
        daysContainer.className = 'days-container';

        const validDays    = week.days.filter(d => !(d.type==='kb' && !d.desc));
        const incomplete   = validDays.filter(d => !state[d.key + '_done']);
        const complete     = validDays.filter(d =>  !!state[d.key + '_done']);

        [...incomplete, ...complete].forEach(day => {
            const card = createDayCard(day, week);
            if (state[day.key + '_done']) card.classList.add('day-done');
            daysContainer.appendChild(card);
        });

        sec.appendChild(daysContainer);

        const completeBtn = document.createElement('button');
        completeBtn.className   = 'week-complete-btn';
        completeBtn.textContent = 'Week Complete';
        completeBtn.addEventListener('click', () => {
            state['week_done_' + week.week] = true;
            saveState();
            render();
        });
        sec.appendChild(completeBtn);

        body.appendChild(sec);
    });
}

function toggleBody(key) {
    const el   = document.getElementById(`body-${key}`);
    const chev = document.getElementById(`chev-${key}`);
    if (!el) return;
    const open = el.style.display !== 'block';
    el.style.display = open ? 'block' : 'none';
    if (chev) chev.classList.toggle('open', open);
}

function refreshStats(dayKey, weekNum) {
    const day  = plan.flatMap(w => w.days).find(d => d.key === dayKey);
    const week = plan.find(w => w.week === weekNum);
    if (!day || !week) return;

    const dp = dayProgress(day);
    const wp = weekProgress(week);

    const ds = document.getElementById(`dstat-${dayKey}`);
    if (ds) {
        if (day.type === 'kb') updateKBDstat(dayKey);
        else ds.textContent = `${dp.done}/${dp.total}`;
    }

    const ws = document.getElementById(`wstat-${weekNum}`);
    if (ws) ws.textContent = `${wp.done}/${wp.total} complete`;

    const wb = document.getElementById(`wbar-${weekNum}`);
    if (wb) wb.style.width = `${wp.pct}%`;
}

function showLog() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('log').style.display   = 'block';
}

function showSetup() {
    document.getElementById('log').style.display   = 'none';
    document.getElementById('setup').style.display = 'flex';
}

function buildMD() {
    let md = '---\ntags: ["workout-log"]\n---\n\n# Training Log: KB + Bodyweight\n\n';
    plan.forEach(week => {
        md += `## Week ${week.week}\n\n`;
        week.days.forEach(day => {
            if (day.type==='kb' && !day.desc) return;
            let heading;
            if (day.type==='kb')  heading = `### ${day.label} — KB (${day.desc})`;
            else if (day.type==='bw')  heading = `### ${day.label} — Bodyweight`;
            else heading = `### ${day.label} — Run`;
            md += heading + '\n';
            if (day.type === 'kb') {
                const n    = getCount(day.key);
                const done = !!state[day.key + '_done'];
                md += `- Sets completed: ${n}\n`;
                md += `- [${done?'x':' '}] Workout Complete\n`;
            } else {
                day.items.forEach((item, i) => {
                    md += `- [${getCheck(day.key,i)?'x':' '}] ${item}\n`;
                });
            }
            md += '\n';
        });
        md += '---\n\n';
    });
    return md;
}

// ── Wire up buttons (no inline onclick) ──────────────
document.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    document.getElementById('start-date').value =
        `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

    const saved = loadState();
    if (saved['__start']) {
        document.getElementById('start-date').value = saved['__start'];
    }

    document.getElementById('gen-btn').addEventListener('click', () => {
        const val = document.getElementById('start-date').value;
        if (!val) return;

        state = loadState();
        state['__start'] = val;
        saveState();

        plan = buildPlan(new Date(val + 'T12:00:00'));
        showLog();
        render();

        const first = plan[0]?.days.find(d => d.type==='kb' ? !!d.desc : true);
        if (first) toggleBody(first.key);
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
        try { localStorage.removeItem('kb_log'); } catch(e) {}
        state = {};
        plan  = [];
        showSetup();
    });

    document.getElementById('export-btn').addEventListener('click', () => {
        document.getElementById('export-text').value = buildMD();
        document.getElementById('export-modal').classList.add('open');
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
        const txt = document.getElementById('export-text').value;
        navigator.clipboard.writeText(txt).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 2000);
        });
    });

    document.getElementById('close-btn').addEventListener('click', () => {
        document.getElementById('export-modal').classList.remove('open');
    });
});
</script>
